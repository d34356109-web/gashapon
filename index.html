<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI TEEN 扭蛋盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .counter-card { transition: transform 0.1s; }
        .counter-card:active { transform: scale(0.97); }
        
        /* 隱藏原生數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans pb-24">

    <!-- Toast 提示訊息容器 -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <span id="toastIcon"></span>
        <span id="toastMsg" class="font-bold tracking-wide"></span>
    </div>

    <!-- 刪除確認的彈出視窗 (Modal) -->
    <div id="deleteModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[60] p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl relative text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">確定刪除此訂單？</h3>
            <p class="text-slate-500 text-sm mb-6">刪除後將無法復原，且所有連線設備的總計數量都會同步扣除。</p>
            <div class="flex gap-3">
                <button onclick="window.closeDeleteModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition">取消</button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition shadow-md shadow-red-200">確定刪除</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">MINI TEEN 扭蛋盤點系統</h1>
            <p class="text-slate-500 mt-2 font-medium">記錄每個客人的扭蛋，並自動加總統計 (多人共用版)</p>
            
            <!-- 雲端連線狀態指示器 -->
            <div id="syncStatus" class="mt-4 flex items-center justify-center gap-2 text-sm font-bold text-amber-500">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </span>
                正在連接雲端伺服器...
            </div>
        </header>

        <!-- Current Order Input -->
        <div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-100 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 pl-1">👤 客人名稱</label>
                    <input type="text" id="customerName" placeholder="請輸入客人名稱 (必填)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition text-lg font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 pl-1">📝 訂單備註 (選填)</label>
                    <input type="text" id="orderNote" placeholder="例如：已付款、自取..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition text-lg font-medium">
                </div>
            </div>

            <div id="counterGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
                <!-- Counters will be injected here by JS -->
            </div>

            <button onclick="window.saveOrder()" id="saveBtn" class="mt-8 w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 active:bg-blue-800 transition shadow-md shadow-blue-200 text-lg flex items-center justify-center gap-2 opacity-50 cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                儲存這筆訂單 (等待連線中)
            </button>
        </div>

        <!-- Summary Table -->
        <div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-100 mb-8">
            <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-4 cursor-pointer hover:bg-slate-50 transition p-2 rounded-xl" onclick="window.toggleSummary()">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    📊 目前總庫存統計
                    <svg id="summaryToggleIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="transform: rotate(180deg);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </h2>
                <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full" id="totalOrdersCount">載入中...</span>
            </div>
            <div id="summaryTableContainer" class="overflow-x-auto block transition-all">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-sm border-b border-slate-100">
                            <th class="py-3 px-2 font-medium">機台</th>
                            <th class="py-3 px-2 font-medium">角色與簡稱</th>
                            <th class="py-3 px-2 text-right font-medium">已抽總數</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody">
                        <!-- Summary rows will be injected here -->
                    </tbody>
                    <tfoot>
                        <tr class="border-t-2 border-slate-200 bg-slate-50">
                            <td colspan="2" class="py-4 px-2 text-right font-bold text-slate-600">總計扭蛋數量：</td>
                            <td class="py-4 px-2 text-right font-black text-2xl text-blue-600" id="grandTotalCount">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- 個別訂單明細列表 -->
        <div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-100">
            <div class="mb-6 border-b border-slate-100 pb-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    📜 各客戶訂單明細
                </h2>
                <p class="text-sm text-slate-500 mt-1">此列表與總庫存為<span class="font-bold text-blue-600">多人共用</span>，最新訂單在最上方</p>
            </div>
            <div id="orderListContainer" class="space-y-4">
                <!-- Orders will be injected here -->
                <p class="text-slate-400 text-center py-4">資料載入中...</p>
            </div>
        </div>
    </div>

    <!-- 編輯訂單的彈出視窗 (Modal) -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-5 md:p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
            <div class="mb-6 sticky top-0 bg-white pt-2 pb-4 border-b border-slate-100 z-10">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800">
                        ✏️ 修改訂單: <span id="editCustomerName" class="text-blue-600 ml-1"></span>
                    </h2>
                    <button onclick="window.closeEditModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <!-- 修改時也可以編輯備註 -->
                <input type="text" id="editOrderNote" placeholder="📝 修改備註 (選填)" class="w-full mt-3 p-3 bg-slate-50 border border-slate-200 rounded-xl text-md font-medium outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition">
            </div>
            
            <div id="editCounterGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 mb-8">
                <!-- Edit counters will be injected here -->
            </div>
            
            <div class="flex gap-4 sticky bottom-0 bg-white pt-4 pb-2 border-t border-slate-100 z-10">
                <button onclick="window.closeEditModal()" class="w-1/3 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition">取消</button>
                <button onclick="window.saveEditedOrder()" class="w-2/3 bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 active:bg-blue-800 transition shadow-md shadow-blue-200">儲存修改</button>
            </div>
        </div>
    </div>

    <!-- 將模組化的 JavaScript 寫在這裡 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // 加入 doc, updateDoc, deleteDoc 來支援修改與刪除功能
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const characters = [
            { id: '1-1', machine: '機台一', name: 'CHOITCHERRY', animal: '白兔', abbr: '哲/喆' },
            { id: '1-2', machine: '機台一', name: 'JJONGTORAM', animal: '粉紅兔兔裝', abbr: '漢' },
            { id: '1-3', machine: '機台一', name: 'SHUASUMI', animal: '小鹿', abbr: '秀' },
            { id: '1-4', machine: '機台一', name: 'O.C.L.', animal: '疊疊貓咪', abbr: '俊' },
            { id: '1-5', machine: '機台一', name: 'TAMTAM', animal: '老虎', abbr: '榮/星' },
            { id: '1-6', machine: '機台一', name: 'FOXDUNGEE', animal: '紫狐狸', abbr: '圓' },
            { id: '1-7', machine: '機台一', name: 'PPYOPULI', animal: '飯粒', abbr: '勳' },
            { id: '2-1', machine: '機台二', name: 'THEpalee', animal: '青蛙', abbr: '浩/八' },
            { id: '2-2', machine: '機台二', name: 'KIMJA', animal: '馬鈴薯', abbr: '奎' },
            { id: '2-3', machine: '機台二', name: 'DOA', animal: '小狗', abbr: '碩' },
            { id: '2-4', machine: '機台二', name: 'BBOOGYULI', animal: '橘子', abbr: '寬' },
            { id: '2-5', machine: '機台二', name: 'NONVER', animal: '灰連帽', abbr: '率/啵' },
            { id: '2-6', machine: '機台二', name: 'CHANDALEE', animal: '水獺', abbr: '燦' }
        ];

        let currentCounts = {};
        let grandTotals = {};
        let orderCount = 0;
        
        // 供修改功能使用的全域變數
        let globalOrdersList = []; 
        let editingOrderId = null;
        let deletingOrderId = null; // 供刪除 Modal 使用
        let editCounts = {};

        // 雲端資料庫變數
        let db = null;
        let currentUser = null;
        let appId = 'default-app-id';

        // 初始化本地資料
        characters.forEach(char => {
            currentCounts[char.id] = 0;
            grandTotals[char.id] = 0;
            editCounts[char.id] = 0;
        });

        // 顯示提示訊息
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMsg = document.getElementById('toastMsg');
            
            toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 z-50 flex items-center gap-2 ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            
            toastIcon.innerHTML = type === 'success' 
                ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
                : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            
            toastMsg.innerText = message;
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2500);
        }

        // 渲染首頁計數器卡片
        function renderCounters() {
            const grid = document.getElementById('counterGrid');
            grid.innerHTML = characters.map(char => `
                <div class="border-2 rounded-2xl p-3 bg-white border-slate-100 hover:border-blue-200 transition counter-card flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-bold">${char.machine}</span>
                        </div>
                        <div class="font-black text-slate-800">${char.abbr}</div>
                        <div class="text-xs text-slate-500 font-medium truncate">${char.animal}</div>
                    </div>
                    <div class="flex items-center justify-between mt-3 bg-slate-50 p-1 rounded-xl">
                        <button onclick="window.updateCount('${char.id}', -1)" class="w-10 h-10 rounded-lg text-slate-500 hover:bg-white hover:shadow-sm font-bold text-xl flex items-center justify-center transition">-</button>
                        <span id="count-${char.id}" class="font-mono text-xl font-black w-10 text-center text-blue-600">${currentCounts[char.id]}</span>
                        <button onclick="window.updateCount('${char.id}', 1)" class="w-10 h-10 rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 font-bold text-xl flex items-center justify-center transition">+</button>
                    </div>
                </div>
            `).join('');
        }

        // 首頁的更新區域數量
        window.updateCount = function(id, delta) {
            currentCounts[id] = Math.max(0, currentCounts[id] + delta);
            document.getElementById(`count-${id}`).innerText = currentCounts[id];
            
            const countElement = document.getElementById(`count-${id}`);
            countElement.classList.add('scale-125');
            setTimeout(() => countElement.classList.remove('scale-125'), 100);
        }

        // 渲染總計表
        function renderSummary() {
            const body = document.getElementById('summaryBody');
            let totalAll = 0;
            
            body.innerHTML = characters.map(char => {
                const total = grandTotals[char.id] || 0;
                totalAll += total;
                const rowStyle = total > 0 ? "bg-blue-50/30" : "";
                const textStyle = total > 0 ? "text-blue-600 font-black" : "text-slate-400 font-medium";
                
                return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition ${rowStyle}">
                    <td class="py-3 px-2 text-xs text-slate-400 font-medium">${char.machine}</td>
                    <td class="py-3 px-2 text-slate-700">
                        <span class="font-bold">${char.abbr}</span> 
                        <span class="text-slate-400 text-sm ml-1">(${char.animal})</span>
                    </td>
                    <td class="py-3 px-2 text-right font-mono text-xl ${textStyle}">${total}</td>
                </tr>
            `}).join('');
            
            document.getElementById('grandTotalCount').innerText = totalAll;
        }

        // 切換總庫存統計顯示/隱藏
        window.toggleSummary = function() {
            const container = document.getElementById('summaryTableContainer');
            const icon = document.getElementById('summaryToggleIcon');
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                container.classList.add('block');
                icon.style.transform = 'rotate(180deg)';
            } else {
                container.classList.remove('block');
                container.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        };

        // 渲染個別訂單列表 (加入修改與刪除按鈕)
        function renderOrderList(orders) {
            const container = document.getElementById('orderListContainer');
            if (orders.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-4 bg-slate-50 rounded-xl">目前還沒有訂單資料</p>';
                return;
            }

            orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            container.innerHTML = orders.map(order => {
                const dateObj = new Date(order.timestamp);
                const timeString = dateObj.toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
                const dateString = dateObj.toLocaleDateString('zh-TW', {month: 'short', day: 'numeric'});

                let itemsHtml = '';
                let orderTotalQty = 0; 
                
                // 產生備註標籤 (若有)
                const noteHtml = order.note ? `<span class="text-sm font-medium text-amber-600 bg-amber-50 px-2.5 py-0.5 rounded-md border border-amber-200 ml-2 shadow-sm">📝 ${order.note}</span>` : '';

                if (order.items) {
                    orderTotalQty = Object.values(order.items).reduce((sum, qty) => sum + qty, 0);
                    
                    itemsHtml = Object.entries(order.items).map(([id, qty]) => {
                        const char = characters.find(c => c.id === id);
                        if (!char) return '';
                        return `
                            <div class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                                <span class="text-sm text-slate-600"><span class="text-[10px] bg-slate-100 px-1 py-0.5 rounded text-slate-500 mr-1">${char.machine}</span> <span class="font-bold text-slate-800 text-base">${char.abbr}</span> <span>(${char.animal})</span></span>
                                <span class="font-mono font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">x${qty}</span>
                            </div>
                        `;
                    }).join('');
                }

                return `
                    <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-100 transition hover:shadow-md hover:bg-white group">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2">
                            <span class="font-black text-lg text-slate-800 flex items-center gap-2 flex-wrap">
                                👤 ${order.customerName}
                                ${noteHtml}
                                <span class="text-sm bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full font-bold ml-1">共 ${orderTotalQty} 顆</span>
                            </span>
                            <div class="flex items-center gap-2 w-full sm:w-auto justify-between sm:justify-end">
                                <span class="text-xs text-slate-500 font-medium bg-white border border-slate-200 px-2 py-1 rounded-full shadow-sm">${dateString} ${timeString}</span>
                                
                                <div class="flex items-center">
                                    <!-- 修改按鈕 -->
                                    <button onclick="window.openEditModal('${order.id}')" class="text-blue-500 hover:bg-blue-100 p-2 rounded-lg transition" title="修改數量">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                    <!-- 刪除按鈕 -->
                                    <button onclick="window.openDeleteModal('${order.id}')" class="text-red-500 hover:bg-red-100 p-2 rounded-lg transition" title="刪除訂單">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // 修改與刪除相關邏輯 (改為 Public 路徑)
        // ==========================================

        window.openEditModal = function(orderId) {
            const order = globalOrdersList.find(o => o.id === orderId);
            if (!order) return;
            
            editingOrderId = orderId;
            document.getElementById('editCustomerName').innerText = order.customerName;
            document.getElementById('editOrderNote').value = order.note || ''; // 載入備註
            
            // 初始化修改用的數量
            characters.forEach(char => {
                editCounts[char.id] = (order.items && order.items[char.id]) ? order.items[char.id] : 0;
            });
            
            renderEditCounters();
            
            // 顯示 Modal
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // 避免背景滾動
            document.body.style.overflow = 'hidden';
        };

        window.closeEditModal = function() {
            editingOrderId = null;
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            
            // 恢復背景滾動
            document.body.style.overflow = 'auto';
        };

        function renderEditCounters() {
            const grid = document.getElementById('editCounterGrid');
            grid.innerHTML = characters.map(char => `
                <div class="border rounded-2xl p-3 bg-white border-slate-100 flex flex-col justify-between">
                    <div>
                        <div class="text-[10px] text-slate-400 mb-0.5">${char.machine}</div>
                        <div class="font-bold text-slate-800 text-sm leading-tight">${char.abbr} <span class="font-normal text-xs text-slate-500 block">${char.animal}</span></div>
                    </div>
                    <div class="flex items-center justify-between mt-3 bg-slate-50 p-1 rounded-xl">
                        <button onclick="window.updateEditCount('${char.id}', -1)" class="w-8 h-8 rounded-lg text-slate-500 hover:bg-white hover:shadow-sm font-bold text-lg flex items-center justify-center transition">-</button>
                        <span id="edit-count-${char.id}" class="font-mono text-lg font-black w-8 text-center text-blue-600">${editCounts[char.id]}</span>
                        <button onclick="window.updateEditCount('${char.id}', 1)" class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 font-bold text-lg flex items-center justify-center transition">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.updateEditCount = function(id, delta) {
            editCounts[id] = Math.max(0, editCounts[id] + delta);
            document.getElementById(`edit-count-${id}`).innerText = editCounts[id];
            
            const countElement = document.getElementById(`edit-count-${id}`);
            countElement.classList.add('scale-125');
            setTimeout(() => countElement.classList.remove('scale-125'), 100);
        }

        window.saveEditedOrder = async function() {
            if (!editingOrderId || !db) return;
            
            let hasItems = false;
            let itemsToSave = {};
            const newNote = document.getElementById('editOrderNote').value.trim();

            characters.forEach(char => {
                if (editCounts[char.id] > 0) {
                    hasItems = true;
                    itemsToSave[char.id] = editCounts[char.id];
                }
            });

            if (!hasItems) {
                showToast('訂單數量不能為 0！若要取消此訂單，請關閉視窗後使用「刪除」功能。', 'error');
                return;
            }

            try {
                // 儲存至公開目錄 (所有人共用)
                const orderRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', editingOrderId);
                await updateDoc(orderRef, {
                    items: itemsToSave,
                    note: newNote
                });
                
                showToast('✅ 訂單修改成功！');
                window.closeEditModal();
            } catch (error) {
                console.error("修改失敗", error);
                showToast('修改失敗，請稍後再試！', 'error');
            }
        };

        // 自訂刪除確認視窗邏輯
        window.openDeleteModal = function(orderId) {
            deletingOrderId = orderId;
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        };

        window.closeDeleteModal = function() {
            deletingOrderId = null;
            const modal = document.getElementById('deleteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!deletingOrderId || !db) return;
            const orderId = deletingOrderId;
            window.closeDeleteModal();

            try {
                // 刪除公開目錄中的該筆訂單
                const orderRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId);
                await deleteDoc(orderRef);
                showToast('🗑️ 訂單已刪除！');
            } catch(error) {
                console.error("刪除失敗", error);
                showToast('刪除失敗，請稍後再試！', 'error');
            }
        });

        // 儲存新訂單邏輯 (改為 Public 路徑)
        window.saveOrder = async function() {
            if (!db) {
                showToast('尚未連線到雲端，請稍後再試！', 'error');
                return;
            }

            const nameInput = document.getElementById('customerName');
            const noteInput = document.getElementById('orderNote');
            const name = nameInput.value.trim();
            const note = noteInput.value.trim();
            const saveBtn = document.getElementById('saveBtn');
            
            if (!name) { 
                showToast('請先輸入客人名稱！', 'error');
                nameInput.focus();
                return; 
            }

            let hasItems = false;
            let itemsToSave = {};

            characters.forEach(char => {
                if(currentCounts[char.id] > 0) {
                    hasItems = true;
                    itemsToSave[char.id] = currentCounts[char.id];
                }
            });

            if(!hasItems) {
                showToast('這筆訂單數量為 0，請先輸入扭蛋數量！', 'error');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = '儲存中...';

            try {
                // 儲存至公開目錄 (所有人共用)
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                await addDoc(ordersRef, {
                    customerName: name,
                    note: note, // 儲存備註
                    items: itemsToSave,
                    timestamp: new Date().toISOString()
                });

                characters.forEach(char => { currentCounts[char.id] = 0; });
                nameInput.value = '';
                noteInput.value = '';
                renderCounters();
                showToast(`成功將「${name}」的訂單儲存至雲端！`);
                
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (error) {
                console.error("儲存失敗", error);
                showToast('儲存至雲端失敗！', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    儲存這筆訂單
                `;
            }
        }

        // ==========================================
        // Firebase 初始化與即時資料同步監聽
        // ==========================================
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyDkhYG8-rAfWzPz4WH5_e2mZBpkE6iD0xM",
                authDomain: "miniteengashapon.firebaseapp.com",
                projectId: "miniteengashapon",
                storageBucket: "miniteengashapon.firebasestorage.app",
                messagingSenderId: "198546039685",
                appId: "1:198546039685:web:0b769f3e5fd98b26cadaec"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);
            appId = 'my-gashapon-app'; 

            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("驗證失敗:", error);
                    showToast("無法連接驗證系統", "error");
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const saveBtn = document.getElementById('saveBtn');
                const syncStatus = document.getElementById('syncStatus');

                if (user) {
                    syncStatus.className = "mt-4 flex items-center justify-center gap-2 text-sm font-bold text-emerald-600";
                    syncStatus.innerHTML = '<span class="relative flex h-3 w-3"><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span> 已連線，雲端同步中';
                    
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    saveBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                        </svg>
                        儲存這筆訂單
                    `;

                    // 監聽公開目錄 (所有人共用)
                    const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                    onSnapshot(ordersRef, (snapshot) => {
                        characters.forEach(char => grandTotals[char.id] = 0);
                        let currentOrderCount = 0;
                        globalOrdersList = []; 

                        snapshot.forEach(docSnap => {
                            currentOrderCount++;
                            const data = docSnap.data();
                            globalOrdersList.push({ id: docSnap.id, ...data }); 

                            if (data.items) {
                                for (const [id, qty] of Object.entries(data.items)) {
                                    if (grandTotals[id] !== undefined) {
                                        grandTotals[id] += qty;
                                    }
                                }
                            }
                        });

                        document.getElementById('totalOrdersCount').innerText = `已完成 ${currentOrderCount} 筆`;
                        renderSummary();
                        renderOrderList(globalOrdersList); 
                    }, (error) => {
                        console.error("資料同步發生錯誤", error);
                        showToast('雲端資料同步中斷', 'error');
                    });
                    
                } else {
                    saveBtn.disabled = true;
                    saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            });
        } catch (error) {
            console.error("Firebase 初始化失敗", error);
            showToast('雲端系統初始化失敗', 'error');
        }

        renderCounters();
        renderSummary();
    </script>
</body>
</html>
